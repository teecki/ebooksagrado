<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Acesso ao eBook</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#07111f,#2b1c0b);color:white;min-height:100vh;display:grid;place-items:center;padding:30px}.box{width:min(720px,100%);background:rgba(255,255,255,.1);border:1px solid rgba(244,207,122,.35);border-radius:28px;padding:38px;box-shadow:0 25px 70px rgba(0,0,0,.35)}h1{font-family:Georgia,serif;color:#f4cf7a;font-size:2.6rem;margin:0 0 12px}p{line-height:1.6;color:#f7ead0}input{width:100%;padding:16px;border-radius:14px;border:1px solid #d6a23c;margin:18px 0;font-size:1rem}button,a{display:inline-flex;background:linear-gradient(135deg,#f4cf7a,#d6a23c);color:#111;padding:15px 24px;border-radius:999px;text-decoration:none;font-weight:800;border:0;cursor:pointer}.result{margin-top:22px;padding:18px;border-radius:16px;background:rgba(0,0,0,.25);border:1px solid rgba(244,207,122,.25)}</style></head><body><div class="box"><h1>Área segura do eBook</h1><p>Digite o mesmo e-mail usado na compra.</p><input id="email" type="email" placeholder="Seu e-mail de compra"><button onclick="requestAccess()">Liberar acesso</button><div id="result" class="result" style="display:none"></div><p><a href="/">Voltar</a></p></div><script>async function requestAccess(){const email=document.getElementById('email').value.trim();const box=document.getElementById('result');box.style.display='block';box.innerHTML='Verificando pagamento...';const res=await fetch('/api/access/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});const data=await res.json();if(!res.ok){box.innerHTML='❌ '+(data.error||'Acesso não liberado.');return}box.innerHTML=`<p>✅ Acesso liberado!</p><p><a href="${data.downloadUrl}">📥 Baixar EBOOK SAGRADO</a></p><p>Este link expira em ${data.expiresInMinutes} minutos.</p>`}window.addEventListener('load',()=>{const saved=localStorage.getItem('buyerEmail');if(saved)document.getElementById('email').value=saved})</script></body></html>
